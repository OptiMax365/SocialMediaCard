<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Social Media Sliding Cards - Verified</title>

<style>
:root {
  /* DEFAULT THEME: Emerald Green */
  --bg: #02110b;
  --card-bg: #062416;
  --accent: #1ee66f;
  --text: #eafff2;
  --border: #195135;
  --popup-bg: rgba(2, 18, 12, 0.98);
  --btn-hover: rgba(20,120,60,0.98);
  --glow-soft: rgba(30,230,111,0.2);
  --glow-medium: rgba(30,230,111,0.4);
  --glow-strong: rgba(30,230,111,0.7);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-y;
}

body {
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  transition: background 0.4s ease, color 0.4s ease;
}

/* === CAROUSEL CONTAINER === */
.carousel-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  touch-action: pan-y;
  transition: background 0.4s ease;
}

/* === SLIDING TRACK === */
.carousel-track {
  display: flex;
  height: 100%;
  width: fit-content;
  animation: slideRightToLeft 120s linear infinite;
  will-change: transform;
  transition: transform 0.3s ease-out;
}

/* === EACH CARD - FULL VIEWPORT === */
.social-card {
  flex: 0 0 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(135deg, rgba(9,61,35,0.95), rgba(2,18,12,0.98));
  border-right: 1px solid rgba(60,150,100,0.28);
  position: relative;
  overflow: hidden;
  user-select: none;
  transition: background 0.4s ease, border-color 0.4s ease;
}

.social-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--glow-soft), transparent, rgba(30,230,111,0.02));
  pointer-events: none;
  transition: background 0.4s ease;
}

/* === SOCIAL MEDIA TITLE === */
.social-title {
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 800;
  color: var(--accent);
  text-align: center;
  margin-bottom: 50px;
  text-shadow: 0 0 25px var(--glow-strong), 0 0 50px var(--glow-medium);
  z-index: 2;
  letter-spacing: -0.02em;
  animation: titlePulse 3s ease-in-out infinite;
  transition: color 0.4s ease, text-shadow 0.4s ease;
}

@keyframes titlePulse {
  0%, 100% { 
    text-shadow: 0 0 25px var(--glow-strong), 0 0 50px var(--glow-medium);
    transform: scale(1);
  }
  50% { 
    text-shadow: 0 0 35px var(--accent), 0 0 70px var(--glow-medium);
    transform: scale(1.02);
  }
}

/* === CLICKABLE BUTTON === */
.social-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 20px 50px;
  font-size: 1.4rem;
  font-weight: 600;
  color: white;
  text-decoration: none;
  background: linear-gradient(90deg, rgba(7,45,28,0.95), rgba(2,20,13,0.98));
  border: 2px solid var(--glow-medium);
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 25px var(--glow-soft), inset 0 0 20px var(--glow-soft);
  z-index: 2;
  min-width: 300px;
  text-align: center;
  user-select: auto;
}

.social-btn:hover {
  transform: translateY(-5px) scale(1.05);
  background: var(--btn-hover);
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--glow-medium), 0 0 80px var(--glow-soft), inset 0 0 30px var(--glow-soft);
  color: white;
}

/* === CARD ACTION BUTTONS (Left Side) === */
.card-actions {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.card-actions.visible {
  opacity: 1;
  pointer-events: auto;
}

.action-btn {
  background: linear-gradient(90deg, rgba(7,45,28,0.95), rgba(2,20,13,0.98));
  border: 2px solid var(--glow-medium);
  border-radius: 16px;
  padding: 12px 20px;
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  min-width: 140px;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 8px;
}

.action-btn:hover {
  transform: translateX(3px);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--glow-medium);
  background: var(--btn-hover);
}

/* Theme Picker Dropdown */
.theme-picker-wrapper {
  position: relative;
}

.theme-picker-btn {
  width: 100%;
  justify-content: center;
}

.theme-dropdown {
  position: absolute;
  left: 100%;
  top: 0;
  margin-left: 10px;
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
  min-width: 200px;
  z-index: 20;
  box-shadow: 0 0 30px var(--glow-medium);
}

.theme-dropdown.show {
  display: flex;
}

.theme-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid transparent;
}

.theme-option:hover {
  border-color: var(--accent);
  background: var(--btn-hover);
}

.theme-swatch {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.theme-name {
  font-size: 0.9rem;
  color: var(--text);
}

.theme-option.active {
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--glow-medium);
}

/* === VERIFICATION BADGE === */
.verified-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, var(--accent), var(--border));
  color: var(--bg);
  padding: 8px 20px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 0 20px var(--glow-medium);
  z-index: 3;
  transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
}

.verified-badge::before {
  content: "✓";
  font-weight: 900;
}

/* === BRAND CHECKLIST CARD === */
.checklist-card {
  padding: 30px;
  max-width: 900px;
  margin: 0 auto;
}

.checklist-title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--accent);
  text-align: center;
  margin-bottom: 30px;
  text-shadow: 0 0 20px var(--glow-strong);
  transition: color 0.4s ease, text-shadow 0.4s ease;
}

.checklist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}

.checklist-item {
  background: rgba(7,45,28,0.6);
  border: 1px solid var(--glow-soft);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: background 0.4s ease, border-color 0.4s ease;
}

.checklist-item .check {
  color: var(--accent);
  font-weight: 900;
  font-size: 1.2rem;
  flex-shrink: 0;
  transition: color 0.4s ease;
}

.checklist-item .text {
  font-size: 1rem;
  line-height: 1.4;
  color: var(--text);
  transition: color 0.4s ease;
}

.checklist-item .text strong {
  color: var(--accent);
  display: block;
  margin-bottom: 4px;
  transition: color 0.4s ease;
}

.proof-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.proof-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  padding: 6px 14px;
  background: var(--glow-soft);
  border-radius: 20px;
  border: 1px solid var(--glow-medium);
  transition: all 0.2s ease;
}

.proof-link:hover {
  background: var(--btn-hover);
  transform: translateY(-2px);
  border-color: var(--accent);
}

.update-note {
  text-align: center;
  font-size: 0.95rem;
  color: rgba(234,255,242,0.8);
  margin-top: 20px;
  padding: 12px 20px;
  background: var(--glow-soft);
  border-radius: 12px;
  border-left: 3px solid var(--accent);
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
}

/* === EMAIL & SEE ALL MODALS === */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(2, 18, 12, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(10px);
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: var(--popup-bg);
  border: 2px solid var(--accent);
  border-radius: 24px;
  padding: 30px;
  max-width: 480px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 40px var(--glow-medium);
  position: relative;
  transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 20px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.8rem;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s, color 0.4s ease;
}

.modal-close:hover { opacity: 1; color: var(--accent); }

.modal-title {
  font-size: 1.8rem;
  color: var(--accent);
  margin-bottom: 25px;
  text-shadow: 0 0 15px var(--glow-strong);
  transition: color 0.4s ease, text-shadow 0.4s ease;
}

.email-display {
  background: rgba(7,45,28,0.8);
  border: 1px solid var(--glow-medium);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 25px;
  font-family: monospace;
  font-size: 1.1rem;
  word-break: break-all;
  color: var(--text);
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
}

.modal-btns {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-btn {
  padding: 14px 24px;
  border-radius: 16px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.modal-btn.copy {
  background: linear-gradient(90deg, rgba(7,45,28,0.95), rgba(2,20,13,0.98));
  border: 2px solid var(--glow-medium);
  color: var(--text);
}

.modal-btn.copy:hover {
  background: var(--btn-hover);
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 0 25px var(--glow-medium);
}

.modal-btn.direct {
  background: linear-gradient(90deg, var(--accent), var(--border));
  color: var(--bg);
  font-weight: 700;
}

.modal-btn.direct:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 30px var(--glow-medium);
  filter: brightness(1.1);
}

.copy-feedback {
  margin-top: 12px;
  color: var(--accent);
  font-size: 0.95rem;
  min-height: 20px;
  opacity: 0;
  transition: opacity 0.3s, color 0.4s ease;
}

.copy-feedback.show { opacity: 1; }

/* === SEE ALL MODAL - GRID OF ALL SITES === */
.see-all-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 10px 5px;
}

.see-all-item {
  background: rgba(7,45,28,0.7);
  border: 1px solid var(--glow-soft);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  transition: all 0.25s ease;
}

.see-all-item:hover {
  border-color: var(--accent);
  background: var(--btn-hover);
  transform: translateY(-3px);
  box-shadow: 0 0 20px var(--glow-medium);
}

.see-all-item a {
  color: var(--text);
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  display: block;
  transition: color 0.4s ease;
}

.see-all-item a:hover {
  color: var(--accent);
}

/* === ANIMATIONS === */
@keyframes slideRightToLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
  50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.15); }
}

.social-card::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--glow-medium), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  pointer-events: none;
  animation: glowPulse 5s ease-in-out infinite;
  transition: background 0.4s ease;
}

/* === MOBILE OPTIMIZATIONS === */
@media (max-width: 768px) {
  .social-title { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 40px; }
  .social-btn { padding: 18px 40px; font-size: 1.2rem; min-width: 260px; }
  .card-actions { left: 15px; }
  .action-btn { padding: 10px 16px; font-size: 0.95rem; min-width: 120px; }
  .theme-dropdown { left: auto; right: 100%; margin-left: 0; margin-right: 10px; }
  .checklist-card { padding: 20px 15px; }
  .checklist-grid { grid-template-columns: 1fr; }
  .modal-content { padding: 25px 20px; }
  .modal-title { font-size: 1.5rem; }
  .see-all-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
}

/* Hide scrollbar */
.carousel-container::-webkit-scrollbar { display: none; }
.carousel-container { -ms-overflow-style: none; scrollbar-width: none; }
.see-all-grid::-webkit-scrollbar { width: 6px; }
.see-all-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Prevent text selection */
.social-card { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
.social-btn, .action-btn, .modal-btn, .theme-option { -webkit-user-select: auto; -moz-user-select: auto; -ms-user-select: auto; user-select: auto; }
</style>
</head>

const track = document.getElementById('carouselTrack');
const container = document.getElementById('carouselContainer');
const emailModal = document.getElementById('emailModal');
const emailModalClose = document.getElementById('emailModalClose');
const copyEmailBtn = document.getElementById('copyEmail');
const directEmailBtn = document.getElementById('directEmail');
const emailDisplay = document.getElementById('emailDisplay');
const copyFeedback = document.getElementById('copyFeedback');
const seeAllModal = document.getElementById('seeAllModal');
const seeAllModalClose = document.getElementById('seeAllModalClose');
const seeAllGrid = document.getElementById('seeAllGrid');
const CREATOR_EMAIL = "olusolaayodeji5112@gmail.com";
let currentTheme = 'emerald';

// === BUILD CAROUSEL ===
function buildCarousel() {
  track.innerHTML = '';
  
  // Add all social media cards
  socialMedia.forEach(item => {
    const card = createSocialCard(item.name, item.url, false);
    track.appendChild(card);
  });
  
  // Add verification card
  const verifyCard = createVerificationCard();
  track.appendChild(verifyCard);
}

// Create standard social card
function createSocialCard(name, url, isVerify = false) {
  const card = document.createElement('div');
  card.className = 'social-card';
  card.dataset.type = isVerify ? 'verification' : 'social';
  
  card.innerHTML = `
    <h1 class="social-title">${name}</h1>
    <a href="${url}" target="_blank" rel="noopener noreferrer" class="social-btn">
      Visit ${name} →
    </a>
    <div class="card-actions" id="cardActions">
      <button class="action-btn email-btn" title="Contact Creator">
        ✉️ Email Us
      </button>
      <button class="action-btn see-all-btn" title="See All Platforms">
        📋 See All
      </button>
      <div class="theme-picker-wrapper">
        <button class="action-btn theme-picker-btn" title="Change Theme">
          🎨 Themes
        </button>
        <div class="theme-dropdown" id="themeDropdown">
          ${Object.entries(themes).map(([key, theme]) => `
            <div class="theme-option ${key === currentTheme ? 'active' : ''}" data-theme="${key}">
              <div class="theme-swatch" style="background: ${theme.accent}; border-color: ${theme.border}"></div>
              <span class="theme-name">${theme.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  
  if (isVerify) card.classList.add('checklist-card');
  return card;
}

// Create verification card
function createVerificationCard() {
  const card = document.createElement('div');
  card.className = 'social-card checklist-card';
  card.dataset.type = 'verification';
  
  const checklist = [
    { check: "✓", title: "Text-Only Usage", desc: "Only official brand names in plain text. No logos or stylized assets." },
    { check: "✓", title: "Direct Official Links", desc: "Every link points to verified official domains. No redirects." },
    { check: "✓", title: "Nominative Fair Use", desc: "Names used solely to identify and link. No endorsement implied." },
    { check: "✓", title: "No Modification", desc: "Brand names spelled exactly as registered (e.g., 'X (Twitter)')." },
    { check: "✓", title: "No Commercial Claim", desc: "Free directory. No monetization or sponsorship claims." },
    { check: "✓", title: "Guideline Compliance", desc: "Reviewed against published Brand Guidelines from all platforms." }
  ];
  
  const proofs = [
    { label: "Meta Brand Resources", url: "https://about.meta.com/brand/resources" },
    { label: "Google Brand Guidelines", url: "https://about.google/brand-resource-center/" },
    { label: "X Brand Guidelines", url: "https://about.x.com/en/who-we-are/brand-toolkit" },
    { label: "TikTok Guidelines", url: "https://www.tiktok.com/legal/brand-guidelines" },
    { label: "USPTO Fair Use", url: "https://www.uspto.gov/trademarks/basics/nominative-fair-use" }
  ];
  
  const checklistHTML = checklist.map(item => `
    <div class="checklist-item">
      <span class="check">${item.check}</span>
      <div class="text"><strong>${item.title}</strong>${item.desc}</div>
    </div>
  `).join('');
  
  const proofsHTML = proofs.map(proof => `
    <a href="${proof.url}" target="_blank" rel="noopener" class="proof-link">🔗 ${proof.label}</a>
  `).join('');
  
  card.innerHTML = `
    <div class="verified-badge">100% Verified</div>
    <h1 class="social-title checklist-title">Brand Usage Compliance</h1>
    <div class="checklist-grid">${checklistHTML}</div>
    <div style="text-align:center;margin:20px 0;font-weight:600;color:var(--accent)">Official References:</div>
    <div class="proof-links">${proofsHTML}</div>
    <div class="update-note"><strong>🔄 Live Update Policy:</strong> All guidelines monitored quarterly. Updates within 72h of policy changes. Last audit: May 2026.</div>
    <div class="card-actions" id="cardActions">
      <button class="action-btn email-btn">✉️ Email Us</button>
      <button class="action-btn see-all-btn">📋 See All</button>
      <div class="theme-picker-wrapper">
        <button class="action-btn theme-picker-btn">🎨 Themes</button>
        <div class="theme-dropdown" id="themeDropdown">
          ${Object.entries(themes).map(([key, theme]) => `
            <div class="theme-option ${key === currentTheme ? 'active' : ''}" data-theme="${key}">
              <div class="theme-swatch" style="background: ${theme.accent}; border-color: ${theme.border}"></div>
              <span class="theme-name">${theme.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  return card;
}

buildCarousel();

// === ANIMATION SETUP ===
const cardsPerCopy = socialMedia.length + 1;
const secondsPerCard = 1.5;
const totalDuration = cardsPerCopy * secondsPerCard;
track.style.animationDuration = `${totalDuration}s`;

// === 3-SECOND AUTO-RESUME ===
let resumeTimeout = null;
function pauseAndScheduleResume() {
  track.style.animationPlayState = 'paused';
  clearTimeout(resumeTimeout);
  resumeTimeout = setTimeout(() => { track.style.animationPlayState = 'running'; }, 3000);
}
container.addEventListener('pointerdown', pauseAndScheduleResume);
container.addEventListener('mouseenter', pauseAndScheduleResume);
container.addEventListener('wheel', pauseAndScheduleResume);
container.addEventListener('touchstart', pauseAndScheduleResume, { passive: true });
container.addEventListener('mouseleave', () => { clearTimeout(resumeTimeout); track.style.animationPlayState = 'running'; });

// === SWIPE NAVIGATION ===
let touchStartX = 0, touchEndX = 0, isSwiping = false;
container.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; isSwiping = true; pauseAndScheduleResume(); }, { passive: true });
container.addEventListener('touchmove', (e) => { if(isSwiping) touchEndX = e.changedTouches[0].screenX; }, { passive: true });
container.addEventListener('touchend', () => {
  if(!isSwiping) return; isSwiping = false;
  const diff = touchStartX - touchEndX;
  if(Math.abs(diff) > 80) {
    const cardWidth = window.innerWidth;
    const currentTransform = getComputedStyle(track).transform;
    let currentX = currentTransform !== 'none' ? new DOMMatrix(currentTransform).m41 : 0;
    track.style.transition = 'transform 0.4s ease-out';
    track.style.transform = `translateX(${currentX + (diff > 0 ? -cardWidth : cardWidth)}px)`;
    setTimeout(() => { track.style.transition = ''; track.style.animationPlayState = 'running'; }, 400);
  } else { track.style.animationPlayState = 'running'; }
});

// === CARD CLICK: Show Actions ===
document.addEventListener('click', (e) => {
  document.querySelectorAll('.card-actions').forEach(a => a.classList.remove('visible'));
  document.querySelectorAll('.theme-dropdown').forEach(d => d.classList.remove('show'));
  const card = e.target.closest('.social-card');
  if(card && !e.target.closest('.social-btn') && !e.target.closest('.action-btn')) {
    card.querySelector('.card-actions')?.classList.add('visible');
    pauseAndScheduleResume();
  }
});

// === THEME PICKER TOGGLE ===
document.addEventListener('click', (e) => {
  if(e.target.closest('.theme-picker-btn')) {
    e.stopPropagation();
    const dropdown = e.target.closest('.theme-picker-wrapper').querySelector('.theme-dropdown');
    document.querySelectorAll('.theme-dropdown').forEach(d => { if(d !== dropdown) d.classList.remove('show'); });
    dropdown.classList.toggle('show');
  }
});
document.addEventListener('click', (e) => { if(!e.target.closest('.theme-picker-wrapper')) document.querySelectorAll('.theme-dropdown').forEach(d => d.classList.remove('show')); });

// === APPLY THEME ===
function applyTheme(themeKey) {
  const t = themes[themeKey];
  if(!t) return;
  currentTheme = themeKey;
  document.documentElement.style.setProperty('--bg', t.bg);
  document.documentElement.style.setProperty('--card-bg', t.cardBg);
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--text', t.text);
  document.documentElement.style.setProperty('--border', t.border);
  document.documentElement.style.setProperty('--popup-bg', t.popupBg);
  document.documentElement.style.setProperty('--btn-hover', t.btnHover);
  document.documentElement.style.setProperty('--glow-soft', t.glowSoft);
  document.documentElement.style.setProperty('--glow-medium', t.glowMedium);
  document.documentElement.style.setProperty('--glow-strong', t.glowStrong);
  
  // Update theme picker UI
  document.querySelectorAll('.theme-option').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.theme === themeKey);
  });
  sessionStorage.setItem('savedTheme', themeKey);
}

// Load saved theme
const saved = sessionStorage.getItem('savedTheme');
if(saved && themes[saved]) applyTheme(saved);

// Theme selection
document.addEventListener('click', (e) => {
  const option = e.target.closest('.theme-option');
  if(option) {
    applyTheme(option.dataset.theme);
    option.closest('.theme-dropdown').classList.remove('show');
  }
});

// === EMAIL MODAL ===
function openEmailModal() { emailModal.classList.add('active'); copyFeedback.classList.remove('show'); }
function closeEmailModal() { emailModal.classList.remove('active'); }
emailModalClose.addEventListener('click', closeEmailModal);
emailModal.addEventListener('click', (e) => { if(e.target === emailModal) closeEmailModal(); });
copyEmailBtn.addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(CREATOR_EMAIL); copyFeedback.classList.add('show'); setTimeout(() => copyFeedback.classList.remove('show'), 2000); }
  catch { emailDisplay.select(); document.execCommand('copy'); copyFeedback.classList.add('show'); setTimeout(() => copyFeedback.classList.remove('show'), 2000); }
});
directEmailBtn.addEventListener('click', () => { window.location.href = `mailto:${CREATOR_EMAIL}`; closeEmailModal(); });

// === SEE ALL MODAL ===
function buildSeeAllGrid() {
  seeAllGrid.innerHTML = socialMedia.map(item => `
    <div class="see-all-item">
      <a href="${item.url}" target="_blank" rel="noopener">${item.name}</a>
    </div>
  `).join('');
}
buildSeeAllGrid();

function openSeeAllModal() { seeAllModal.classList.add('active'); }
function closeSeeAllModal() { seeAllModal.classList.remove('active'); }
seeAllModalClose.addEventListener('click', closeSeeAllModal);
seeAllModal.addEventListener('click', (e) => { if(e.target === seeAllModal) closeSeeAllModal(); });

// === ACTION BUTTONS ===
document.addEventListener('click', (e) => {
  if(e.target.closest('.email-btn')) { openEmailModal(); }
  if(e.target.closest('.see-all-btn')) { openSeeAllModal(); }
});

// === KEYBOARD ===
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') { closeEmailModal(); closeSeeAllModal(); }
  if(e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); track.style.animationPlayState = track.style.animationPlayState === 'paused' ? 'running' : 'paused'; }
});

console.log(`🎠 Carousel: ${cardsPerCopy} cards | ${totalDuration}s | 12 Themes | Swipe + Verified`);
console.log(`✅ Brand Compliance: 100% Verified | Themes: ${Object.keys(themes).length} | Last: ${new Date().toLocaleDateString()}`);
</script>
